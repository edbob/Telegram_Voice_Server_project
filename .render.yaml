services:
  - type: web
    name: telegram-voice-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server/app.py
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"

  - type: worker
    name: telegram-voice-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/telegram_bot.py
    plan: free
    autoDeploy: true