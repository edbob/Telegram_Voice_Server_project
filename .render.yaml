services:
  - type: web
    name: telegram-voice-server
    env: python
    buildCommand: ""
    startCommand: python server/app.py
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000

  - type: worker
    name: telegram-bot
    env: python
    startCommand: python bot/telegram_bot.py
    plan: free
    autoDeploy: true
